name: Daily AI Digest

on:
  schedule:
    # Run every day at 6:00 AM Pakistan Standard Time (PKT = UTC+5, so 1:00 AM UTC)
    - cron: '0 1 * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  daily-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: daily_digest
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect signals (RSS, GitHub, X, Reddit)
        working-directory: daily_digest
        env:
          APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}
        run: python scrape.py

      - name: Analyze with Gemini 2.5 Flash and send email
        working-directory: daily_digest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python analyze_and_email.py

      - name: Upload signals as artifact (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-digest-signals
          path: daily_digest/daily_digest_signals.json
          retention-days: 7
